name: mentora
description: A mentoring app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"  # 🔴 Change: "^3.6.0" ki jagah yeh range use karo
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # 🔥 Firebase - CORRECT COMPATIBLE VERSIONS
  firebase_core: ^3.12.1  # 🔴 Change: 4.x nahi, 3.x use karo
  firebase_auth: ^5.5.1   # 🔴 Change: 5.x use karo (core 3.x ke saath compatible)
  cloud_firestore: ^5.6.5  # 🔴 Change: 5.x use karo
  google_sign_in: ^6.2.2  # ✅ Thk hai
  firebase_storage: ^12.4.4  # 🔴 Change: 12.x use karo
  firebase_messaging: ^15.2.4  # 🔴 Change: 15.x use karo

  # 📱 Local Storage & Notifications
  shared_preferences: ^2.5.2  # ✅ Updated
  flutter_local_notifications: ^18.0.1 # ✅ Thk hai

  # 📷 Image & File
  cached_network_image: ^3.4.1  # ✅ Updated
  image_picker: ^1.1.2  # 🔴 Change: 1.2.1 unstable hai
  file_picker: ^8.1.7   # ✅ Thk hai

  # 📁 Storage & Path
  path_provider: ^2.1.5  # ✅ Thk hai
  path: ^1.9.0  # ✅ Thk hai

  # 📱 Permissions
  permission_handler: ^11.4.0  # 🔴 Change: 12.x main issues hain

  # 🎤 Audio/Video
  record: ^6.2.0  # ✅ Thk hai
  audioplayers: ^6.4.0  # ✅ Updated
  video_player: ^2.9.2  # ✅ Thk hai
  chewie: ^1.10.0  # ✅ Updated

  # 😊 Emoji
  emoji_picker_flutter: ^4.4.0  # ✅ Thk hai

  # 🌐 Network
  dio: ^5.8.0  # ✅ Updated
  http: ^1.3.0  # ✅ Updated
  cloudinary_public: ^0.23.0  # ✅ Thk hai
  url_launcher: ^6.3.1  # ✅ Updated

  intl: ^0.19.0  # ✅ Thk hai
  mime_type: ^1.0.0  # ✅ Thk hai
  flutter_native_splash: ^2.4.7  # ✅ Thk hai

  # 📄 PDF
  flutter_pdfview: ^1.3.4  # ✅ Updated

  # 🌍 WEB SPECIFIC PACKAGES
  universal_html: ^2.2.4  # ✅ Thk hai
  cross_file: ^0.3.4+4  # ✅ Thk hai
  mime: ^1.0.6  # ✅ Updated
  http_parser: ^4.1.2  # ✅ Updated
  js: ^0.7.2  # 🔴 Change: 0.6.7 discontinued hai
  web: ^1.1.1  # ✅ Updated

  # 🎨 UI
  cupertino_icons: ^1.0.8  # ✅ Thk hai

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0  # 🔴 Change: 6.x main issues hain

flutter_native_splash:
  image: assets/images/logo.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
